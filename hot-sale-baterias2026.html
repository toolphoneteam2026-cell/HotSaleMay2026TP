<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 Hot Sale – Ventas de Baterías</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --fire: #ff3d00;
    --fire2: #ff9100;
    --dark: #111214;
    --card: #1a1c1f;
    --card2: #222529;
    --border: #2e3035;
    --text: #e8e9ea;
    --muted: #6b7280;
    --green: #22c55e;
  }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    padding: 20px 16px 48px;
  }

  .header {
    max-width: 780px;
    margin: 0 auto 28px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }

  .logo-block { line-height: 1; }

  .fire-tag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: linear-gradient(90deg, var(--fire), var(--fire2));
    color: #fff;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 11px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 3px;
    margin-bottom: 6px;
  }

  h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: clamp(32px, 8vw, 52px);
    letter-spacing: 0.5px;
    line-height: 1;
    color: #fff;
  }

  h1 em {
    font-style: normal;
    background: linear-gradient(90deg, var(--fire), var(--fire2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .fecha { font-size: 12px; color: var(--muted); text-align: right; }

  .sheets-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: #1a3a2a;
    border: 1px solid #166534;
    color: #86efac;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 5px;
    letter-spacing: 0.5px;
    margin-top: 6px;
  }

  /* TOAST */
  .sync-toast {
    position: fixed;
    bottom: 24px;
    right: 20px;
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 8px;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.3s, transform 0.3s;
    z-index: 999;
    pointer-events: none;
    max-width: 280px;
  }
  .sync-toast.show  { opacity: 1; transform: translateY(0); }
  .sync-toast.syncing { background: #1e3a5f; color: #90caf9; border: 1px solid #1565c0; }
  .sync-toast.ok    { background: #1a3a2a; color: #86efac; border: 1px solid #166534; }
  .sync-toast.err   { background: #3a1a1a; color: #fca5a5; border: 1px solid #991b1b; }

  /* STATS */
  .stats {
    max-width: 780px;
    margin: 0 auto 24px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }

  .stat {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    text-align: center;
  }

  .stat-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 36px;
    line-height: 1;
    color: var(--fire2);
  }

  .stat-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* FORM */
  .form-wrap {
    max-width: 780px;
    margin: 0 auto 24px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }

  .form-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 18px;
    letter-spacing: 0.5px;
    color: #fff;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .form-title::before {
    content: '';
    display: inline-block;
    width: 3px; height: 18px;
    background: linear-gradient(var(--fire), var(--fire2));
    border-radius: 2px;
  }

  .fields {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .fields .span2 { grid-column: 1 / -1; }

  .field label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .field input {
    width: 100%;
    background: var(--dark);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 14px;
    padding: 10px 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  .field input:focus { border-color: var(--fire); }
  .field input::placeholder { color: #444; }

  .btn-add {
    margin-top: 14px;
    width: 100%;
    padding: 13px;
    background: linear-gradient(90deg, var(--fire), var(--fire2));
    color: #fff;
    border: none;
    border-radius: 9px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 18px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }

  .btn-add:hover { opacity: 0.9; }
  .btn-add:active { transform: scale(0.99); }
  .btn-add:disabled { opacity: 0.5; cursor: not-allowed; }

  /* TABLE */
  .table-wrap { max-width: 780px; margin: 0 auto; }

  .table-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .table-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 18px;
    color: #fff;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .table-title::before {
    content: '';
    display: inline-block;
    width: 3px; height: 18px;
    background: linear-gradient(var(--fire), var(--fire2));
    border-radius: 2px;
  }

  .btn-clear {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 6px;
    font-family: 'Barlow', sans-serif;
    font-size: 12px;
    padding: 6px 12px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }

  .btn-clear:hover { border-color: var(--fire); color: var(--fire); }

  .table-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  table { width: 100%; border-collapse: collapse; }

  thead th {
    background: var(--card2);
    padding: 11px 14px;
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--muted);
  }

  tbody tr { border-top: 1px solid var(--border); transition: background 0.15s; }
  tbody tr:hover { background: rgba(255,255,255,0.02); }

  td { padding: 12px 14px; font-size: 14px; vertical-align: middle; }

  .td-num { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 700; color: var(--fire); }
  .td-cliente { font-weight: 600; color: #fff; }

  .modelo-pill {
    display: inline-block;
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 3px 9px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
  }

  .td-precio { color: var(--green); font-weight: 600; }

  .desc-badge {
    display: inline-block;
    background: rgba(34,197,94,0.12);
    color: var(--green);
    font-size: 11px;
    border-radius: 4px;
    padding: 1px 6px;
    margin-top: 2px;
  }

  .sync-icon { font-size: 11px; }
  .synced   { color: #86efac; }
  .nosynced { color: #fca5a5; }

  .td-hora { color: var(--muted); font-size: 12px; }

  .btn-del {
    background: none;
    border: none;
    color: #3a3d42;
    font-size: 15px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 5px;
    transition: color 0.2s, background 0.2s;
  }

  .btn-del:hover { color: var(--fire); background: rgba(255,61,0,0.1); }

  .empty { padding: 52px 20px; text-align: center; color: var(--muted); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty p { font-size: 14px; line-height: 1.6; }

  @media (max-width: 480px) {
    .fields { grid-template-columns: 1fr; }
    .fields .span2 { grid-column: 1; }
    .stats { grid-template-columns: 1fr 1fr; }
    .stats .stat:last-child { grid-column: 1 / -1; }
    thead th:nth-child(5), td:nth-child(5),
    thead th:nth-child(6), td:nth-child(6) { display: none; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo-block">
    <div class="fire-tag">🔥 Hot Sale 2026</div>
    <h1>Ventas de <em>Baterías</em></h1>
  </div>
  <div style="text-align:right">
    <div class="fecha" id="fecha-hoy"></div>
    <div class="sheets-badge">📊 Sincronizado con Google Sheets</div>
  </div>
</div>

<div class="sync-toast" id="sync-toast"></div>

<div class="stats">
  <div class="stat">
    <div class="stat-num" id="s-ventas">0</div>
    <div class="stat-label">Ventas</div>
  </div>
  <div class="stat">
    <div class="stat-num" id="s-baterias">0</div>
    <div class="stat-label">Baterías</div>
  </div>
  <div class="stat">
    <div class="stat-num" id="s-total">$0</div>
    <div class="stat-label">Recaudado</div>
  </div>
</div>

<div class="form-wrap">
  <div class="form-title">Registrar nueva venta</div>
  <div class="fields">
    <div class="field span2">
      <label>Nombre del cliente</label>
      <input id="f-cliente" type="text" placeholder="Ej. María López" />
    </div>
    <div class="field">
      <label>Modelo / tipo de batería</label>
      <input id="f-modelo" type="text" placeholder="Ej. NS-70, 42 placas..." />
    </div>
    <div class="field">
      <label>Cantidad</label>
      <input id="f-cantidad" type="number" min="1" value="1" />
    </div>
    <div class="field">
      <label>Precio unitario ($)</label>
      <input id="f-precio" type="number" min="0" step="0.01" placeholder="0.00" />
    </div>
    <div class="field">
      <label>Descuento (%)</label>
      <input id="f-descuento" type="number" min="0" max="100" value="0" placeholder="0" />
    </div>
  </div>
  <button class="btn-add" id="btn-add" onclick="agregar()">+ Agregar venta</button>
</div>

<div class="table-wrap">
  <div class="table-header">
    <div class="table-title">Ventas registradas</div>
    <button class="btn-clear" onclick="borrarTodo()">Borrar todo</button>
  </div>
  <div class="table-box">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Cliente</th>
          <th>Modelo</th>
          <th>Cant.</th>
          <th>Total</th>
          <th>Hora</th>
          <th>Sheets</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<script>
  const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbwH6pjntDDumDnoM7wt6Givf3ri4-D2FbmH_0BbcBbURZ800KqQNxkjrtCTckNi9ZFDJw/exec';

  const hoy = new Date();
  document.getElementById('fecha-hoy').innerHTML =
    hoy.toLocaleDateString('es-MX', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

  let ventas  = JSON.parse(localStorage.getItem('hs_ventas')  || '[]');
  let nextId  = parseInt(localStorage.getItem('hs_nextid')    || '1');

  function save() {
    localStorage.setItem('hs_ventas',  JSON.stringify(ventas));
    localStorage.setItem('hs_nextid',  nextId);
  }

  function fmt(n) {
    return '$' + n.toLocaleString('es-MX', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  /* ── TOAST ── */
  let toastTimer;
  function toast(msg, type) {
    const el = document.getElementById('sync-toast');
    el.textContent = msg;
    el.className = 'sync-toast ' + type + ' show';
    clearTimeout(toastTimer);
    if (type !== 'syncing') {
      toastTimer = setTimeout(() => { el.classList.remove('show'); }, 3500);
    }
  }

  /* ── SYNC A SHEETS ── */
  async function syncToSheets(venta) {
    try {
      toast('⏳ Guardando en Google Sheets...', 'syncing');

      // Usamos un form URL-encoded + no-cors para evitar problemas CORS desde archivo local
      const params = new URLSearchParams({
        cliente:   venta.cliente,
        modelo:    venta.modelo,
        cantidad:  venta.cant,
        precio:    venta.precio,
        descuento: venta.desc
      });

      await fetch(SHEETS_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: params.toString()
      });

      // Con no-cors no podemos leer la respuesta, pero si no lanzó error llegó bien
      venta.synced = true;
      save();
      render();
      toast('✅ Guardado en Google Sheets', 'ok');
    } catch (err) {
      venta.synced = false;
      save();
      render();
      toast('⚠️ No se pudo sincronizar: ' + err.message, 'err');
    }
  }

  /* ── RENDER ── */
  function render() {
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '';

    if (ventas.length === 0) {
      tbody.innerHTML = `
        <tr><td colspan="8">
          <div class="empty">
            <div class="empty-icon">🔋</div>
            <p>Todavía no hay ventas.<br>¡Registra la primera arriba!</p>
          </div>
        </td></tr>`;
    } else {
      [...ventas].reverse().forEach(v => {
        const tr = document.createElement('tr');
        const descTxt  = v.desc > 0 ? `<br><span class="desc-badge">−${v.desc}%</span>` : '';
        const syncIcon = v.synced === true
          ? '<span class="sync-icon synced" title="En Google Sheets">✓</span>'
          : v.synced === false
            ? '<span class="sync-icon nosynced" title="Sin sincronizar">✗</span>'
            : '<span class="sync-icon" style="color:#555">—</span>';

        tr.innerHTML = `
          <td class="td-num">${v.id}</td>
          <td class="td-cliente">${v.cliente}</td>
          <td><span class="modelo-pill">${v.modelo}</span></td>
          <td>${v.cant}</td>
          <td class="td-precio">${fmt(v.total)}${descTxt}</td>
          <td class="td-hora">${v.hora}</td>
          <td style="text-align:center">${syncIcon}</td>
          <td><button class="btn-del" onclick="eliminar(${v.id})" title="Eliminar">✕</button></td>
        `;
        tbody.appendChild(tr);
      });
    }

    const totalVentas   = ventas.length;
    const totalBaterias = ventas.reduce((a, v) => a + v.cant, 0);
    const totalDinero   = ventas.reduce((a, v) => a + v.total, 0);
    document.getElementById('s-ventas').textContent   = totalVentas;
    document.getElementById('s-baterias').textContent = totalBaterias;
    document.getElementById('s-total').textContent    = fmt(totalDinero);
  }

  /* ── AGREGAR ── */
  async function agregar() {
    const cliente = document.getElementById('f-cliente').value.trim();
    const modelo  = document.getElementById('f-modelo').value.trim();
    const cant    = parseInt(document.getElementById('f-cantidad').value)   || 1;
    const precio  = parseFloat(document.getElementById('f-precio').value)   || 0;
    const desc    = parseFloat(document.getElementById('f-descuento').value) || 0;

    if (!cliente) { alert('Escribe el nombre del cliente.'); document.getElementById('f-cliente').focus(); return; }
    if (!modelo)  { alert('Escribe el modelo de la batería.'); document.getElementById('f-modelo').focus(); return; }

    const precioFinal = precio * (1 - desc / 100);
    const total = precioFinal * cant;
    const hora  = new Date().toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });

    const venta = { id: nextId++, cliente, modelo, cant, precio, desc, total, hora, synced: null };
    ventas.push(venta);
    save();
    render();

    document.getElementById('f-cliente').value  = '';
    document.getElementById('f-modelo').value   = '';
    document.getElementById('f-cantidad').value = '1';
    document.getElementById('f-cliente').focus();

    // Sync en segundo plano
    await syncToSheets(venta);
  }

  function eliminar(id) {
    if (!confirm('¿Eliminar esta venta?')) return;
    ventas = ventas.filter(v => v.id !== id);
    save();
    render();
  }

  function borrarTodo() {
    if (!confirm('¿Borrar todas las ventas locales? No se puede deshacer.\n\nNota: las ventas ya guardadas en Google Sheets no se borran.')) return;
    ventas  = [];
    nextId  = 1;
    save();
    render();
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.activeElement.tagName === 'INPUT') agregar();
  });

  render();
</script>
</body>
</html>
